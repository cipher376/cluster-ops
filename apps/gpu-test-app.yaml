apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gpu-smoke-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'http://gitlab-server.lan/ml/cluster-ops.git'
    targetRevision: HEAD
    path: workloads/gpu-smoke-test
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true