apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrastructure-bootstrap
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'http://172.16.0.102/ml/cluster-ops.git'
    targetRevision: HEAD
    path: infrastructure
    directory: 
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true