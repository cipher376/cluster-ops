apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: workloads-bootstrap
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://gitlab.ncs-cloud.lan/ml/cluster-ops.git'
    targetRevision: HEAD
    path: workloads
    directory: 
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true # 100% required for Kubeflow
      - RespectIgnoreDifferences=true
      - ServerSideApply=true