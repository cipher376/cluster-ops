apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-runner-secret
  namespace: gitlab-runner
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  # vault:
  #   entity:
  #     role: "gitlab-runner-role"
  target:
    name: gitlab-runner-secret
    creationPolicy: Owner
    template:
      metadata:
  data:
    - secretKey: runner-token
      remoteRef:
        key: gitlab-runner/registration
        property: token