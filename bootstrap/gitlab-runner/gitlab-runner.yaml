apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitlab-runner
  namespace: argocd
spec:
  project: default
  source:
    chart: gitlab-runner
    repoURL: https://charts.gitlab.io
    targetRevision: 0.63.0
    helm:
      values: |
        gitlabUrl: "http://172.16.0.102"

        # --- RBAC Configuration ---
        rbac:
          create: true
        serviceAccount:
          create: true
          name: gitlab-runner

        # Tolerations for the runner MANAGER pod (not job pods)
        tolerations:
          - key: "dedicated"
            operator: "Equal"
            value: "gpu"
            effect: "NoSchedule"

          - key      : "dedicated"
            operator : "Equal"
            value    : "gpu"
            effect   : "NoExecute"


        runners:
          secret: gitlab-runner-secret
          registrationTokenKey: "runner-registration-token"
          runnerTokenKey: "runner-token"
          executor: kubernetes

          kubernetes:
            nodeSelector:
                hardware: "gpu"
            node_tolerations:
              - key      : "dedicated"
                operator : "Equal"
                value    : "gpu"
                effect   : "NoSchedule"

              - key      : "dedicated"
                operator : "Equal"
                value    : "gpu"
                effect   : "NoExecute"

          config: |
            [[runners]]
              request_concurrency = 2
              poll_timeout = 600
              poll_interval = 5
              image_pull_policy = "if-not-present"

              [runners.kubernetes]
                namespace           = "gitlab-runner"
                image               = "pytorch/pytorch:2.2.0-cuda12.1-cudnn8-runtime"
                privileged          = true
                cpu_limit           = "4"
                memory_limit        = "8Gi"
                service_account     = "gitlab-runner"
                bearer_token_overwrite_allowed    = false
                service_account_overwrite_allowed = "gitlab-runner"

                tolerations = [{ key = "dedicated", operator = "Equal", value = "gpu", effect = "NoExecute"" },{ key = "dedicated", operator = "Equal", value = "gpu", effect = "NoSchedule"" }]

                [runners.kubernetes.resource_requirements]
                  [runners.kubernetes.resource_requirements.limits]
                    "nvidia.com/gpu" = "1"
                  [runners.kubernetes.resource_requirements.requests]
                    "nvidia.com/gpu" = "1"

              # Node selector — job pods land on GPU node only
              # [[runners.kubernetes.node_selector]]
              #   hardware = "gpu"

              # Tolerations for JOB PODS — must be in TOML config block,
              # not in Helm values runners.tolerations
              # [[runners.kubernetes.tolerations]]
              #   key      = "dedicated"
              #   operator = "Equal"
              #   value    = "gpu"
              #   effect   = "NoSchedule"

              # NVIDIA libs from host
              [[runners.kubernetes.volumes.host_path]]
                name       = "nvidia-libs"
                mount_path = "/usr/local/nvidia"
                read_only  = true
                host_path  = "/lib/x86_64-linux-gnu"

              # HuggingFace model cache — ephemeral per job
              [[runners.kubernetes.volumes.empty_dir]]
                name       = "model-cache"
                mount_path = "/root/.cache/huggingface"

              # NFS checkpoint storage
              [[runners.kubernetes.volumes.host_path]]
                name       = "nfs-checkpoints"
                mount_path = "/models/checkpoints"
                host_path  = "/mnt/training-cache/checkpoints"
                read_only  = false

  destination:
    server: https://kubernetes.default.svc
    namespace: gitlab-runner

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true