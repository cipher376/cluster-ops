apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitlab-runner
  namespace: argocd
spec:
  project: default
  source:
    chart: gitlab-runner
    repoURL: https://charts.gitlab.io
    targetRevision: 0.63.0
    helm:
      values: |
        gitlabUrl: "http://172.16.0.102"

        # --- RBAC Configuration ---
        rbac:
          create: false
        serviceAccount:
          create: false
          name: gitlab-runner

        # --- Secret Configuration ---
        # GitLab 18.x uses authentication tokens (glrt- prefix) — no registration token
        # 'secret' points to the K8s secret Vault Agent injects at runtime
        # 'runnerToken' tells the chart to read the 'runner-token' key from that secret
        runners:
          secret: gitlab-runner-secret
          # registrationTokenKey is not valid in 18.x — use runnerToken instead
          # The chart reads the 'runner-token' key from the secret named above

          registrationTokenKey: "runner-registration-token"
          runnerTokenKey: "runner-token"
          executor: kubernetes

          config: |
            [[runners]]
              request_concurrency = 2

              [runners.kubernetes]
                namespace           = "gitlab-runner"
                image               = "pytorch/pytorch:2.2.0-cuda12.1-cudnn8-runtime"
                privileged          = true
                cpu_limit           = "4"
                memory_limit        = "8Gi"

                service_account     = "gitlab-runner"
                service_account_name     = "gitlab-runner"
                
                bearer_token_overwrite_allowed = false

                [runners.kubernetes.resource_requirements]
                  [runners.kubernetes.resource_requirements.limits]
                    "nvidia.com/gpu" = "1"
                  [runners.kubernetes.resource_requirements.requests]
                    "nvidia.com/gpu" = "1"

              [[runners.kubernetes.node_selector]]
                hardware = "gpu"

              [[runners.kubernetes.tolerations]]
                key      = "dedicated"
                operator = "Equal"
                value    = "gpu"
                effect   = "NoExecute"

              # NVIDIA libs from host — required since you're using host driver passthrough
              [[runners.kubernetes.volumes.host_path]]
                name       = "nvidia-libs"
                mount_path = "/usr/local/nvidia"
                read_only  = true
                host_path  = "/lib/x86_64-linux-gnu"

              # HuggingFace model cache — ephemeral per job
              [[runners.kubernetes.volumes.empty_dir]]
                name       = "model-cache"
                mount_path = "/root/.cache/huggingface"

              # NFS checkpoint storage on prodesk-node-02 ZFS pool
              [[runners.kubernetes.volumes.host_path]]
                name       = "nfs-checkpoints"
                mount_path = "/models/checkpoints"
                host_path  = "/mnt/training-cache/checkpoints"
                read_only  = false

  destination:
    server: https://kubernetes.default.svc
    namespace: gitlab-runner

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true