apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitlab-runner
  namespace: argocd
spec:
  project: default
  source:
    chart: gitlab-runner
    repoURL: https://charts.gitlab.io
    targetRevision: 0.63.0
    helm:
      values: |
        gitlabUrl: "http://172.16.0.102"

        # --- RBAC Configuration ---
        rbac:
          create: true  # Let the chart create RBAC resources
        serviceAccount:
          create: true  # Create the service account
          name: gitlab-runner
          # Annotations if needed
          # annotations: {}
        
        # Remove this duplicate line - it's not needed
        # serviceAccountName: "gitlab-runner"

        runners:
          secret: gitlab-runner-secret
          # Remove this - the runner's config will handle it
          # serviceAccountName: "gitlab-runner"
          
          registrationTokenKey: "runner-registration-token"
          runnerTokenKey: "runner-token"
          executor: kubernetes

          config: |
            [[runners]]
              request_concurrency = 2

              [runners.kubernetes]
                namespace           = "gitlab-runner"
                image               = "pytorch/pytorch:2.2.0-cuda12.1-cudnn8-runtime"
                privileged          = true
                cpu_limit           = "4"
                memory_limit        = "8Gi"

                # ONLY this line is needed in the runner config
                service_account = "gitlab-runner"
                
                # Remove this - it's not a valid config field
                # service_account_name = "gitlab-runner"
                
                bearer_token_overwrite_allowed = false
                
                # Allow the runner to overwrite service account (optional)
                service_account_overwrite_allowed = "gitlab-runner"

                [runners.kubernetes.resource_requirements]
                  [runners.kubernetes.resource_requirements.limits]
                    "nvidia.com/gpu" = "1"
                  [runners.kubernetes.resource_requirements.requests]
                    "nvidia.com/gpu" = "1"

              [[runners.kubernetes.node_selector]]
                hardware = "gpu"

              [[runners.kubernetes.tolerations]]
                key      = "dedicated"
                operator = "Equal"
                value    = "gpu"
                effect   = "NoExecute"

              # NVIDIA libs from host
              [[runners.kubernetes.volumes.host_path]]
                name       = "nvidia-libs"
                mount_path = "/usr/local/nvidia"
                read_only  = true
                host_path  = "/lib/x86_64-linux-gnu"

              # HuggingFace model cache
              [[runners.kubernetes.volumes.empty_dir]]
                name       = "model-cache"
                mount_path = "/root/.cache/huggingface"

              # NFS checkpoint storage
              [[runners.kubernetes.volumes.host_path]]
                name       = "nfs-checkpoints"
                mount_path = "/models/checkpoints"
                host_path  = "/mnt/training-cache/checkpoints"
                read_only  = false

  destination:
    server: https://kubernetes.default.svc
    namespace: gitlab-runner

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true