apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# MUST be kube-system for pods with system-cluster-critical priorityClass
namespace: kube-system
resources:
- patches/resource.yaml
- patches/storageclass.yaml
- ../base

configMapGenerator:
  - name: ca-pemstore
    namespace: kube-system
    files:
    - ca.crt=patches/root-ca.crt
    options:
      disableNameSuffixHash: true

patches:
- path: statefulset.yaml
  target:
    kind: StatefulSet

- path: patches/juicefs-controller.yaml
  target:
    kind: StatefulSet
    name: juicefs-csi-controller

- path: patches/juicefs-node.yaml
  target:
    kind: DaemonSet
    name: juicefs-csi-node

- path: patches/mount-pod-config.yaml
  target:
    kind: ConfigMap
    name: juicefs-csi-driver-config

# - path: patches/storageclass.yaml
#   target:
#     kind: StorageClass
#     name: juicefs-sc

- patch: |-
    $patch: delete
    kind: Service
    apiVersion: v1
    metadata:
      name: juicefs-admission-webhook
      namespace: kube-system
  target:
    kind: Service
    name: juicefs-admission-webhook
    namespace: kube-system
- patch: |-
    $patch: delete
    apiVersion: v1
    kind: Secret
    metadata:
      name: juicefs-webhook-certs
      namespace: kube-system
  target:
    version: v1
    kind: Secret
    name: juicefs-webhook-certs
    namespace: kube-system
- patch: |-
    $patch: delete
    apiVersion: admissionregistration.k8s.io/v1
    kind: MutatingWebhookConfiguration
    metadata:
      name: juicefs-admission-webhook
  target:
    group: admissionregistration.k8s.io
    version: v1
    kind: MutatingWebhookConfiguration
    name: juicefs-admission-webhook
- patch: |-
    $patch: delete
    apiVersion: admissionregistration.k8s.io/v1
    kind: MutatingWebhookConfiguration
    metadata:
      name: juicefs-admission-serverless-webhook
  target:
    group: admissionregistration.k8s.io
    version: v1
    kind: MutatingWebhookConfiguration
    name: juicefs-admission-serverless-webhook
- patch: |-
    $patch: delete
    apiVersion: admissionregistration.k8s.io/v1
    kind: ValidatingWebhookConfiguration
    metadata:
      name: juicefs-admission-webhook
  target:
    group: admissionregistration.k8s.io
    version: v1
    kind: ValidatingWebhookConfiguration
    name: juicefs-admission-webhook
