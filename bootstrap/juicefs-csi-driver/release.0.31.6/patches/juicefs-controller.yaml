# Remove webhook certs from controller
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: juicefs-csi-controller
  namespace: kube-system
spec:
  template:
    spec:
      nodeSelector:
        hardware: "gpu"
        nvidia.com/gpu.present: "true"
      # Add tolerations
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "gpu"
          effect: "NoSchedule"
        - key: "dedicated"
          operator: "Equal"
          value: "gpu"
          effect: "NoExecute"
      containers:
        - name: juicefs-plugin
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi

          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: juicefs-sc-secret
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: juicefs-sc-secret
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_REGION
              value: "us-east-1"
            - name: SSL_CERT_FILE
              value: /etc/ssl/certs/ca.crt
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/ssl/certs/ca.crt
          volumeMounts:
            - name: ca-certs
              mountPath: /etc/ssl/certs/ca.crt
              subPath: ca.crt
            - name: webhook-certs
              $patch: delete
      volumes:
        - name: ca-certs
          configMap:
            name: ca-pemstore
            defaultMode: 0444
        
        - name: juicefs-config
          configMap:
            name: juicefs-csi-driver-config
            defaultMode: 420
        
        - name: webhook-certs
          $patch: delete
