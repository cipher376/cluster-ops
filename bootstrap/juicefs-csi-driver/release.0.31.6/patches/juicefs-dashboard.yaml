apiVersion: apps/v1
kind: Deployment
metadata:
  name: juicefs-csi-dashboard
  namespace: kube-system
spec:
  template:
    spec:
      volumes:
        - name: auth-volume
          secret:
            secretName: juicefs-dashboard-auth
      containers:
        # 1. The original JuiceFS dashboard container
        - name: dashboard
          env:
            # Change the internal listening port so it doesn't fight with Nginx
            - name: PORT
              value: "8080"
            # Ensure it locks down to local pod traffic only
            - name: HOST
              value: "127.0.0.1"

        # 2. The Nginx reverse-proxy sidecar (The Gateway's target entrypoint)
        - name: auth-proxy
          image: nginx:alpine
          ports:
            - containerPort: 8088
              name: http
          volumeMounts:
            - name: auth-volume
              mountPath: /etc/nginx/auth
              readOnly: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              cat << 'EOF' > /etc/nginx/conf.d/default.conf
              server {
                  listen 8088;
                  location / {
                      auth_basic "JuiceFS Admin Console Authentication Required";
                      auth_basic_user_file /etc/nginx/auth/auth;
                      
                      # Safely proxy directly to the modified internal dashboard port
                      proxy_pass http://127.0.0.1:8080;
                      
                      proxy_set_header Host $host;
                      proxy_set_header X-Real-IP $remote_addr;
                      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto $scheme;
                  }
              }
              EOF
              exec nginx -g 'daemon off;'