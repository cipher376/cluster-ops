apiVersion: apps/v1
kind: Deployment
metadata:
  name: juicefs-csi-dashboard
  namespace: kube-system
spec:
  template:
    spec:
      volumes:
        - name: auth-volume
          secret:
            secretName: juicefs-dashboard-auth
      containers:
        - name: dashboard
        - name: auth-proxy
          image: nginx:alpine
          ports:
            - containerPort: 18088
              name: http
          volumeMounts:
            - name: auth-volume
              mountPath: /etc/nginx/auth
              readOnly: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              cat << 'EOF' > /etc/nginx/conf.d/default.conf
              server {
                  listen 18088;
                  
                  # Enforce password gate globally
                  auth_basic "JuiceFS Admin Console Authentication Required";
                  auth_basic_user_file /etc/nginx/auth/auth;

                  location / {
                      # Direct proxy straight to the dashboard container
                      proxy_pass http://127.0.0.1:8088;
                      
                      # Re-inject and preserve multi-hop headers from your upstream proxies
                      proxy_set_header Host $host;
                      proxy_set_header X-Real-IP $remote_addr;
                      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto $scheme;
                      
                      # Crucial: Explicitly forward UI deep-links back to root if the dashboard engine misses them
                      error_page 404 = @fallback;
                  }

                  location @fallback {
                      # Forces an internal path rewrite to / to load the app skeleton
                      proxy_pass http://127.0.0.1:8088/;
                      proxy_set_header Host $host;
                  }
              }
              EOF
              exec nginx -g 'daemon off;'