apiVersion: apps/v1
kind: Deployment
metadata:
  name: juicefs-csi-dashboard
  namespace: kube-system
spec:
  template:
    spec:
      volumes:
        - name: auth-volume
          secret:
            secretName: juicefs-dashboard-auth
      containers:
        # 1. The original JuiceFS dashboard container (Leave it untouched)
        - name: dashboard
          # No manual port environment overrides needed since it ignores them

        # 2. The Nginx reverse-proxy sidecar (Shifted to port 8089)
        - name: auth-proxy
          image: nginx:alpine
          ports:
            - containerPort: 8089
              name: auth-http
          volumeMounts:
            - name: auth-volume
              mountPath: /etc/nginx/auth
              readOnly: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              cat << 'EOF' > /etc/nginx/conf.d/default.conf
              server {
                  listen 8089;
                  location / {
                      auth_basic "JuiceFS Admin Console Authentication Required";
                      auth_basic_user_file /etc/nginx/auth/auth;
                      
                      # Proxy directly to the native dashboard container interface
                      proxy_pass http://127.0.0.1:8088;
                      
                      proxy_set_header Host $host;
                      proxy_set_header X-Real-IP $remote_addr;
                      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto $scheme;
                  }
              }
              EOF
              exec nginx -g 'daemon off;'