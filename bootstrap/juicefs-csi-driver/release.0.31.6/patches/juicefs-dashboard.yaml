apiVersion: apps/v1
kind: Deployment
metadata:
  name: juicefs-csi-dashboard
  namespace: kube-system
spec:
  template:
    spec:
      volumes:
        - name: auth-volume
          secret:
            secretName: juicefs-dashboard-auth
      containers:
        - name: dashboard
        - name: auth-proxy
          image: nginx:alpine
          ports:
            - containerPort: 18088
              name: http
          volumeMounts:
            - name: auth-volume
              mountPath: /etc/nginx/auth
              readOnly: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              cat << 'EOF' > /etc/nginx/conf.d/default.conf
              server {
                  listen 18088;
                  
                  location / {
                      auth_basic "JuiceFS Admin Console Authentication Required";
                      auth_basic_user_file /etc/nginx/auth/auth;
                      
                      proxy_pass http://127.0.0.1:8088;
                      
                      # Required Headers for API Routing
                      proxy_set_header Host $host;
                      proxy_set_header X-Real-IP $remote_addr;
                      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto $scheme;
                      
                      # Crucial Fix: WebSocket and Stream Upgrades
                      proxy_http_version 1.1;
                      proxy_set_header Upgrade $http_upgrade;
                      proxy_set_header Connection "upgrade";
                      
                      # Prevent proxy timeouts from dropping data channels prematurely
                      proxy_read_timeout 86400s;
                      proxy_send_timeout 86400s;
                  }
              }
              EOF
              exec nginx -g 'daemon off;'