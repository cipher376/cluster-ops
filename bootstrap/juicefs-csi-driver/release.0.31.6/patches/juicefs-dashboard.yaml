apiVersion: apps/v1
kind: Deployment
metadata:
  name: juicefs-csi-dashboard
  namespace: kube-system
spec:
  template:
    spec:
      containers:
        - name: dashboard
          env:
            # Enable basic authentication
            - name: AUTH_ENABLED
              value: "true"
            # Set username and password from secret
            - name: AUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: juicefs-sc-secret
                  key: username
            - name: AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: juicefs-sc-secret
                  key: password