apiVersion: v1
kind: ConfigMap
metadata:
  name: juicefs-csi-driver-config
  namespace: kube-system
data:
  config.yaml: |
    mountPodPatch:
      - env:
          - name: SSL_CERT_FILE
            value: /etc/ssl/certs/ca.crt
          - name: NODE_EXTRA_CA_CERTS
            value: /etc/ssl/certs/ca.crt
        volumeMounts:
          - name: ca-certs
            mountPath: /etc/ssl/certs/ca.crt
            subPath: ca.crt
        volumes:
          - name: ca-certs
            configMap:
              name: ca-pemstore
              defaultMode: 0444
        resources:
          requests:
            cpu: 2000m
            memory: 2Gi
          limits:
            cpu: 8000m
            memory: 8Gi
    controller:
      leaderElection:
        enabled: true