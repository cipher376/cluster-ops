apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: juicefs-sc-secret-es
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "-2"  # Install early before storage-dependent workloads
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: juicefs-sc-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        metaurl: "redis://:{{ .redis_password | urlquery }}@redis-juicefs-master.juicefs-metadata.svc.cluster.local:6379/1"
        accesskey: "{{ .accesskey }}"
        secretkey: "{{ .secretkey }}"
        access-key: "{{ .accesskey }}"
        secret-key: "{{ .secretkey }}"
        AWS_ACCESS_KEY_ID: "{{ .accesskey }}"
        AWS_SECRET_ACCESS_KEY: "{{ .secretkey }}"
        name: "seaweedfs-volume"
        storage: "s3"
        bucket: "https://s3.seaweedfs.ncs-cloud.lan"
        format-options: "trash-days=1,block-size=4096"
  data:
    - secretKey: redis_password
      remoteRef:
        key: db/redis
        property: redis_db_password
    - secretKey: accesskey
      remoteRef:
        key: seaweedfs/s3/admin-role
        property: access_key
    - secretKey: secretkey
      remoteRef:
        key: seaweedfs/s3/admin-role
        property: secret_key
   

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: juicefs-sc-secret-es
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "-2"  # Install early before storage-dependent workloads
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: juicefs-dashboard-auth
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        username: "{{ .juice_username }}" #dashboard
        password: "{{ .juice_password }}" #dashboard
  data:
    - secretKey: juice_username
      remoteRef:
        key: juicefs/dashboard
        property: user
    - secretKey: juice_password
      remoteRef:
        key: juicefs/dashboard
        property: password
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: juicefs-sc
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
provisioner: csi.juicefs.com
reclaimPolicy: Delete
volumeBindingMode: Immediate
allowVolumeExpansion: true
parameters:
  name: seaweedfs-volume
  csi.storage.k8s.io/node-publish-secret-name: juicefs-sc-secret
  csi.storage.k8s.io/node-publish-secret-namespace: kube-system
  csi.storage.k8s.io/provisioner-secret-name: juicefs-sc-secret
  csi.storage.k8s.io/provisioner-secret-namespace: kube-system
  # Pass CA cert to mount pods
  juicefs/mount-ca-certs: ca-pemstore
  juicefs/mount-ca-certs-key: ca.crt

  # Mount pod resource configuration
  juicefs/mount-cpu-limit: "8000m"
  juicefs/mount-cpu-request: "2000m"
  juicefs/mount-memory-limit: 8Gi
  juicefs/mount-memory-request: 2Gi


mountOptions:
  - cache-size=102400
  - cache-dir=/mnt/juicefs-cache
  - free-space-ratio=0.1
  # Performance optimizations for LLM workloads
  - enable-ioctl
  - attr-cache=3                  # Attribute cache timeout (seconds)
  - entry-cache=3                 # Entry cache timeout (seconds)
  - dir-entry-cache=3             # Directory entry cache timeout
  - max-uploads=20                # Max concurrent uploads (default 20)
  - max-deletes=10                # Max concurrent deletes (default 10)
  # Optional: For large file performance
  - writeback                     # Enable writeback cache
  - buffer-size=300               # I/O buffer size (MiB)
  - prefetch=3                    # Prefetch blocks for sequential reads
  # Optional: Metrics and monitoring
  - metrics=0.0.0.0:9567          # Enable metrics endpoint


