resources:
# Kubeflow Pipelines (SeaweedFS as default S3 storage)
- ../../upstream/26.03/applications/pipeline/overlays  # Pipeline definitions stored in the database
# Katib
- ../../upstream/26.03/applications/katib/upstream/installs/katib-with-kubeflow
# Central Dashboard
- ../../upstream/26.03/applications/dashboard/overlays/istio
# Notebooks v1
- ../../upstream/26.03/applications/notebooks-v1/overlays/istio
# Trainer (Training Operator v2)
- ../../upstream/26.03/applications/trainer/overlays
# KServe
- ../../upstream/26.03/applications/kserve/kserve
- ../../upstream/26.03/applications/kserve/models-web-app/overlays/kubeflow
# Spark Operator
- ../../upstream/26.03/applications/spark/spark-operator/overlays/kubeflow



images:
  - name: gcr.io/kubebuilder/kube-rbac-proxy
    newName: registry.k8s.io/kubebuilder/kube-rbac-proxy
    newTag: v0.16.0  # Or v0.18.0 for better security

secretGenerator:
  - name: kubeflow-dashboard-oidc
    namespace: kubeflow  # <-- Must be in the kubeflow namespace
    literals:
      - client-secret=pUBnBOY80SnXgjibTYM9ZWNzY2xreNGQok
    options:
      disableNameSuffixHash: true





patches:
  - target:
      kind: ConfigMap
      name: kfp-launcher
      namespace: kubeflow
    path: patches/launcher-config.yml
  
  - target:
      kind: ConfigMap
      name: jupyter-web-app-config
    path: patches/jupyter-ui-config.yml

  - target:
      kind: Deployment
      name: dashboard
      namespace: kubeflow
    path: patches/dashboard-env.yml


  - target:
      kind: Deployment
      name: jupyter-web-app-deployment
      namespace: kubeflow
    path: patches/jupyter-web-app-deployment.yml

  - target:
      kind: Deployment
      name: ml-pipeline
      namespace: kubeflow
    path: patches/ml-pipeline.yml
  
  - target:
      kind: Deployment
      name: ml-pipeline-persistenceagent
      namespace: kubeflow
    path: patches/ml-pipeline-persistenceagent.yml

  - target:
      kind: Deployment
      name: ml-pipeline-scheduledworkflow
      namespace: kubeflow
    path: patches/ml-pipeline-scheduledworkflow.yml

  - target:
      kind: Deployment
      name: workflow-controller
      namespace: kubeflow
    path: patches/workflow-controller.yml

  - target:
      kind: Deployment
      name: tensorboard-controller-deployment
      namespace: kubeflow
    path: patches/tensorboard-controller.yml

  - target:
      kind: Deployment
      name: notebook-controller-deployment
      namespace: kubeflow
    path: patches/notebook-controller.yml

  - target:
      kind: Deployment
      name: cache-server
      namespace: kubeflow
    path: patches/cache-server.yml
