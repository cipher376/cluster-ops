apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: kubeflow
spec:
  template:
    spec:
      containers:
        - name: dashboard
          env:
          - name: OIDC_AUTH_URL
            value: "https://kubeflow.ncs-cloud.lan/dex"
          - name: OIDC_CLIENT_ID
            value: "kubeflow-oidc-authservice"
            
          - name: OIDC_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: kubeflow-dashboard-oidc
                key: client-secret
                
          - name: USERID_HEADER
            value: "kubeflow-userid"
          - name: USERID_PREFIX
            value: ""
          # --- ADD THIS VARIABLE TO TRIGGER AUTOMATIC REGISTRATION ---
          - name: CD_REGISTRATION_FLOW
            value: "true"