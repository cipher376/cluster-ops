apiVersion: v1
kind: ConfigMap
metadata:
  name: dex
  namespace: auth
data:
  config.yaml: |
    connectors:
    - type: oidc
      id: keycloak
      name: Keycloak
      config:
        issuer: https://keycloak.ncs-cloud.lan/realms/kubeflow
        clientID: kubeflow-oidc-client
        clientSecretRef:
          name: dex-keycloak-config
          key: client-secret
        redirectURI: https://kubeflow.ncs-cloud.lan/dex/callback
