apiVersion: apps/v1
kind: Deployment
metadata:
  name: jupyter-web-app-deployment
  namespace: kubeflow
spec:
  template:
    spec:
      volumes:
      - name: seaweedfs-ca
        configMap:
          name: seaweedfs-ca
      containers:
      - name: jupyter-web-app-deployment
        volumeMounts:
        - name: seaweedfs-ca
          mountPath: /etc/ssl/certs/seaweedfs
          readOnly: true
        env:
        - name: SSL_CERT_FILE
          value: "/etc/ssl/certs/seaweedfs/ca.crt"