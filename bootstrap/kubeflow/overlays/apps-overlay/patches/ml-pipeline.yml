apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-pipeline
  namespace: kubeflow
spec:
  template:
    spec:
      volumes:
      - name: ca-pemstore
        configMap:
          name: ca-pemstore

      containers:
      - name: ml-pipeline-api-server
      
        volumeMounts:
        - name: ca-pemstore
          mountPath: /etc/ssl/certs/custom-ca
          readOnly: true

        env:
        - name: SSL_CERT_FILE
          value: /etc/ssl/certs/custom-ca/ca.crt
        - name: REQUESTS_CA_BUNDLE
          value: /etc/ssl/certs/custom-ca/ca.crt

        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: seaweedfs-s3-credentials # Matches target.name from your ExternalSecret
              key: AWS_ACCESS_KEY_ID         # Matches your ESO secretKey
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: seaweedfs-s3-credentials # Matches target.name from your ExternalSecret
              key: AWS_SECRET_ACCESS_KEY     # Matches your ESO secretKey