apiVersion: apps/v1
kind: Deployment
metadata:
  name: notebook-controller-deployment
  namespace: kubeflow
spec:
  template:
    spec:
      volumes:
      - name: ca-pemstore
        configMap:
          name: ca-pemstore
      containers:
      - name: manager
        volumeMounts:
        - name: ca-pemstore
          mountPath: /etc/ssl/certs/custom-ca
          readOnly: true
        env:
        - name: SSL_CERT_FILE
          value: /etc/ssl/certs/custom-ca/ca.crt