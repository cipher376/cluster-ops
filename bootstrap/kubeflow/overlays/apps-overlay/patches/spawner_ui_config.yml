# --------------------------------------------------------------
# Configuration file for the Kubeflow Notebooks UI.
#
# About the `readOnly` configs:
#  - when `readOnly` is set to "true", the respective option
#    will be disabled for users and only set by the admin
#  - when 'readOnly' is missing, it defaults to 'false'
# --------------------------------------------------------------

spawnerFormDefaults:
  ################################################################
  # Container Images
  ################################################################
  allowCustomImage: true
  hideRegistry: true
  hideTag: false

  imagePullPolicy:
    readOnly: false
    value: IfNotPresent

  image:
    value: ghcr.io/kubeflow/kubeflow/notebook-servers/jupyter-scipy:v1.11.0-rc.1
    options:
    - ghcr.io/kubeflow/kubeflow/notebook-servers/jupyter-scipy:v1.11.0-rc.1
    - ghcr.io/kubeflow/kubeflow/notebook-servers/jupyter-pytorch-full:v1.11.0-rc.1
    - ghcr.io/kubeflow/kubeflow/notebook-servers/jupyter-pytorch-cuda-full:v1.11.0-rc.1
    - ghcr.io/kubeflow/kubeflow/notebook-servers/jupyter-pytorch-gaudi-full:v1.11.0-rc.1
    - ghcr.io/kubeflow/kubeflow/notebook-servers/jupyter-tensorflow-full:v1.11.0-rc.1
    - ghcr.io/kubeflow/kubeflow/notebook-servers/jupyter-tensorflow-cuda-full:v1.11.0-rc.1

  imageGroupOne:
    value: ghcr.io/kubeflow/kubeflow/notebook-servers/codeserver-python:v1.11.0-rc.1
    options:
    - ghcr.io/kubeflow/kubeflow/notebook-servers/codeserver-python:v1.11.0-rc.1

  imageGroupTwo:
    value: ghcr.io/kubeflow/kubeflow/notebook-servers/rstudio-tidyverse:v1.11.0-rc.1
    options:
    - ghcr.io/kubeflow/kubeflow/notebook-servers/rstudio-tidyverse:v1.11.0-rc.1

  cpu:
    readOnly: false
    value: "0.5"
    limitFactor: "1.2"

  memory:
    readOnly: false
    value: "1.0Gi"
    limitFactor: "1.2"

  gpus:
    readOnly: false
    value:
      vendor: ""
      vendors:
      - limitsKey: "nvidia.com/gpu"
        uiName: "NVIDIA"
      - limitsKey: "amd.com/gpu"
        uiName: "AMD"
      - limitsKey: "habana.ai/gaudi"
        uiName: "Intel Gaudi"
      num: "none"

  workspaceVolume:
    readOnly: false
    value:
      mount: /home/jovyan
      newPvc:
        metadata:
          name: "{notebook-name}-workspace"
        spec:
          resources:
            requests:
              storage: 5Gi
          accessModes:
          - ReadWriteOnce

  dataVolumes:
    readOnly: false
    value: []

  affinityConfig:
    readOnly: false
    value: ""
    options: []

  # CUSTOM: GPU toleration group as the default selection
  tolerationGroup:
    readOnly: false
    value: "gpu-pool"
    options:
    - groupKey: "gpu-pool"
      displayName: "Dedicated NVIDIA GPU Node Pool"
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "gpu"
          effect: "NoExecute"
        - key: "dedicated"
          operator: "Equal"
          value: "gpu"
          effect: "NoSchedule"

  shm:
    readOnly: false
    value: true

  configurations:
    readOnly: false
    value: []

  environment:
    readOnly: false
    value: {}

# CUSTOM: Top-level tolerationsGroups (adds GPU pool to the UI dropdown)
tolerationsGroups:
  - groupKey: "gpu-pool"
    displayName: "Dedicated NVIDIA GPU Node Pool"
    tolerations:
      - key: "dedicated"
        operator: "Equal"
        value: "gpu"
        effect: "NoExecute"
      - key: "dedicated"
        operator: "Equal"
        value: "gpu"
        effect: "NoSchedule"