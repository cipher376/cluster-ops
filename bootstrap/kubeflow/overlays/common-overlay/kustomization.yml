resources:
# Cert-Manager
- ../../upstream/26.03/common/cert-manager/overlays/kubeflow

# Istio
- ../../upstream/26.03/common/istio/istio-crds/base
- ../../upstream/26.03/common/istio/istio-namespace/base
- ../../upstream/26.03/common/istio/istio-install/overlays/oauth2-proxy

# Oauth2-proxy
- ../../upstream/26.03/common/oauth2-proxy/overlays/m2m-dex-only       # for all clusters

# Dex
- ../../upstream/26.03/common/dex/overlays/oauth2-proxy

# KNative
- ../../upstream/26.03/common/knative/knative-serving/overlays/gateways
- ../../upstream/26.03/common/istio/cluster-local-gateway/base

# Kubeflow namespace
- ../../upstream/26.03/common/kubeflow-namespace/base
# Kubeflow Roles
- ../../upstream/26.03/common/kubeflow-roles/base
# Kubeflow Istio Resources
- ../../upstream/26.03/common/istio/kubeflow-istio-resources/base

# User namespace
- ../../upstream/26.03/common/user-namespace/base




images:
  - name: gcr.io/kubebuilder/kube-rbac-proxy
    newName: registry.k8s.io/kubebuilder/kube-rbac-proxy
    newTag: v0.16.0  # Or v0.18.0 for better security


# Generate a ConfigMap from the CA certificate file
configMapGenerator:
  - name: dex-keycloak-config
    namespace: auth
    files:
    - keycloak.ncs-cloud.lan=patches/root-ca.crt
    options:
      labels:
        app: dex

patches:
  - target:
      kind: ConfigMap
      name: dex
      namespace: auth
    path: patches/dex-patch.yml
  
  - target:
      kind: Deployment
      name: dex
      namespace: auth
    patch: |
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: keycloak-ca
          configMap:
            name: keycloak-ca
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value:
          name: keycloak-ca
          mountPath: /etc/ssl/certs/keycloak-ca
          readOnly: true
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: SSL_CERT_FILE
          value: /etc/ssl/certs/keycloak-ca/keycloak.ncs-cloud.lan

          
  - target:
      version: v1
      kind: RequestAuthentication
      name: dex-jwt
      namespace: istio-system
    patch: |-
      - op: replace
        path: /spec/jwtRules
        value:
        - forwardOriginalToken: true
          fromHeaders:
          - name: Authorization
            prefix: "Bearer "
          issuer: https://kubeflow.ncs-cloud.lan/dex
          jwksUri: https://kubeflow.ncs-cloud.lan/dex/keys
          outputClaimToHeaders:
          - claim: email
            header: kubeflow-userid
          - claim: groups
            header: kubeflow-groups