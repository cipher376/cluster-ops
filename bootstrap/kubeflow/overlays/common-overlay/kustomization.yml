resources:
# Cert-Manager
- ../../upstream/26.03/common/cert-manager/overlays/kubeflow

# Istio
- ../../upstream/26.03/common/istio/istio-crds/base
- ../../upstream/26.03/common/istio/istio-namespace/base
- ../../upstream/26.03/common/istio/istio-install/overlays/oauth2-proxy

# Oauth2-proxy
- ../../upstream/26.03/common/oauth2-proxy/overlays/m2m-dex-only       # for all clusters

# Dex
- ../../upstream/26.03/common/dex/overlays/oauth2-proxy

# KNative
- ../../upstream/26.03/common/knative/knative-serving/overlays/gateways
- ../../upstream/26.03/common/istio/cluster-local-gateway/base

# Kubeflow namespace
- ../../upstream/26.03/common/kubeflow-namespace/base
# Kubeflow Roles
- ../../upstream/26.03/common/kubeflow-roles/base
# Kubeflow Istio Resources
- ../../upstream/26.03/common/istio/kubeflow-istio-resources/base

# User namespace
- ../../upstream/26.03/common/user-namespace/base


- ../../extensions




images:
  - name: gcr.io/kubebuilder/kube-rbac-proxy
    newName: registry.k8s.io/kubebuilder/kube-rbac-proxy
    newTag: v0.16.0  # Or v0.18.0 for better security


# Generate a ConfigMap from the CA certificate file
configMapGenerator:
  - name: dex-keycloak-config
    namespace: auth
    files:
    - keycloak.ncs-cloud.lan=patches/root-ca.crt
    options:
      labels:
        app: dex
        
secretGenerator:
  - name: dex-keycloak-config
    namespace: auth
    # behavior: replace 
    literals:
    - client-secret=C8YiBlRa6XxPBZ7ele9M01qj3c2oy0BU
    - client-id=kubeflow-oidc-client
    options:
      disableNameSuffixHash: true

patches:
  - target:
      kind: ConfigMap
      name: dex
      namespace: auth
    path: patches/dex-patch-cm.yml

  - target:
      kind: Deployment
      name: dex
      namespace: auth
    path: patches/dex-patch-deployment.yml

  - target:
      kind: Deployment
      name: oauth2-proxy
      namespace: oauth2-proxy
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OAUTH2_PROXY_OIDC_ISSUER_URL
          value: "https://kubeflow.ncs-cloud.lan/dex"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OAUTH2_PROXY_REDEEM_URL
          value: "http://dex.auth.svc.cluster.local:5556/dex/token"

  - target:
      kind: RequestAuthentication
      name: dex-jwt
      namespace: istio-system
    patch: |
      - op: replace
        path: /spec/jwtRules
        value:
        - forwardOriginalToken: true
          fromHeaders:
          - name: Authorization
            prefix: "Bearer "
          issuer: https://kubeflow.ncs-cloud.lan/dex
          jwksUri: http://dex.auth.svc.cluster.local:5556/dex/keys
          audiences:
            - kubeflow-oidc-client
            - kubeflow-oidc-authservice
          outputClaimToHeaders:
          - claim: email
            header: kubeflow-userid
          - claim: groups
            header: kubeflow-groups