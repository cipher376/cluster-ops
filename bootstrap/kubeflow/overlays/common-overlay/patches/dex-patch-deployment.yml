apiVersion: apps/v1
kind: Deployment
metadata:
  name: dex
  namespace: auth
spec:
  template:
    spec:
      volumes:
      - name: keycloak-ca
        configMap:
          name: keycloak-ca
      containers:
      - name: dex
        volumeMounts:
        - name: keycloak-ca
          mountPath: /etc/ssl/certs/keycloak-ca
          readOnly: true
        env:
        - name: SSL_CERT_FILE
          value: /etc/ssl/certs/keycloak-ca/keycloak.ncs-cloud.lan
        - name: KEYCLOAK_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: dex-keycloak-config
              key: client-secret