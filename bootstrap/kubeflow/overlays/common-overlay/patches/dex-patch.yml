apiVersion: v1
kind: ConfigMap
metadata:
  name: dex
  namespace: auth
data:
  config.yaml: |
    # --- REQUIRED BOILERPLATE ---
    issuer: https://kubeflow.ncs-cloud.lan/dex
    storage:
      type: kubernetes
      config:
        inCluster: true
    web:
      http: 0.0.0.0:5556
    logger:
      level: debug
      format: text

    # --- YOUR KEYCLOAK CONNECTOR ---
    connectors:
    - type: oidc
      id: keycloak
      name: Keycloak
      config:
        issuer: http://keycloak.ncs-cloud.lan/realms/kubeflow
        clientID: kubeflow-oidc-client
        clientSecretRef:
          name: dex-keycloak-config
          key: client-secret
        redirectURI: http://kubeflow.ncs-cloud.lan/dex/callback
        # Explicitly map the claims Kubeflow needs
        userNameKey: email
        claimMapping:
          email: email
          groups: groups