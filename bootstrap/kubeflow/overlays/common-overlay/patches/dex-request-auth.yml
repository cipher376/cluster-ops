apiVersion: security.istio.io/v1
kind: RequestAuthentication
metadata:
  name: dex-jwt
  namespace: istio-system
spec:
  jwtRules:
  - forwardOriginalToken: true
    fromHeaders:
    - name: Authorization
      prefix: "Bearer "
    issuer: https://kubeflow.ncs-cloud.lan/dex
    jwksUri: https://kubeflow.ncs-cloud.lan/dex/keys
    outputClaimToHeaders:
    - claim: email
      header: kubeflow-userid
    - claim: groups
      header: kubeflow-groups