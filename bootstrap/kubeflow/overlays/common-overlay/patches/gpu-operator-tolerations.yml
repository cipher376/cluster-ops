apiVersion: clusterpolicies.nvidia.com/v1
kind: ClusterPolicy
metadata:
  name: cluster-policy
spec:
  daemonsets:
    # Forces all driver, discovery, and plugin daemonsets to cross your taint barrier
    tolerations:
      - key: "dedicated"
        operator: "Equal"
        value: "gpu"
        effect: "NoExecute"
      - key: "dedicated"
        operator: "Equal"
        value: "gpu"
        effect: "NoSchedule"