apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hubble-ui-route
  namespace: kube-system  # Hubble lives here by default
spec:
  parentRefs:
    - name: cilium-gateway
      namespace: cilium-secrets
  hostnames:
    - "hubble.lab.lan"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hubble-ui
          port: 80