apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: juicefs-dashboard-route
  namespace: kube-system
spec:
  parentRefs:
    - name: cilium-gateway
      namespace: kube-system
  hostnames:
    - "juicefs.internal.ncs-cloud.lan"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: juicefs-csi-dashboard
          namespace: kube-system
          port: 18088 # Target the safe proxy port