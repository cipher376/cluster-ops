# juicefs-dashboard-route.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: juicefs-dashboard-route
  namespace: kube-system
spec:
  parentRefs:
    - name: cilium-gateway
      namespace: kube-system
  hostnames:
    - "juicefs.internal.ncs-cloud.lan"  # Replace with your domain or remove for IP access
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: juicefs-csi-dashboard
          namespace: kube-system
          port: 80