apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vault-ui
  namespace: vault
spec:
  parentRefs:
    - name: cilium-gateway
      namespace: cilium-secrets
      sectionName: http
  hostnames:
    - "vault.lab.lan"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: vault-ui
          namespace: vault
          port: 8200