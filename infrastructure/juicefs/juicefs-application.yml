apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: juicefs-csi-driver
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"  # Install early before storage-dependent workloads
spec:
  project: default
  source:
    repoURL: https://juicedata.github.io/charts/
    chart: juicefs-csi-driver
    targetRevision: 0.31.0  # Latest stable version
    helm:
      values: |
        # --- Kubelet Configuration (K3s specific) ---
        kubeletDir: /var/lib/kubelet
        
        # --- Controller Configuration ---
        controller:
          enabled: true
          replicas: 2                    # HA with 2 replicas
          provisioner: true
          leaderElection:
            enabled: true
          nodeSelector:
            hardware: "gpu"
            nvidia.com/gpu.present: "true"
          tolerations:
            - key: "dedicated"
              operator: "Equal"
              value: "gpu"
              effect: "NoSchedule"
            - key: "dedicated"
              operator: "Equal"
              value: "gpu"
              effect: "NoExecute"
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: juicefs-aws-creds
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: juicefs-aws-creds
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_REGION
              value: "us-east-1"  # Optional: Set if your S3 requires region
            - name: SSL_CERT_FILE
              value: /etc/ssl/certs/ca.crt
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/ssl/certs/ca.crt
          extraVolumes:
            - name: ca-certs
              configMap:
                name: ca-pemstore
                defaultMode: 0444
          extraVolumeMounts:
            - name: ca-certs
              mountPath: /etc/ssl/certs/ca.crt
              subPath: ca.crt

        # --- Node Service Configuration ---
        node:
          enabled: true
          nodeSelector:
            hardware: "gpu"
            nvidia.com/gpu.present: "true"
          tolerations:
            - key: "dedicated"
              operator: "Equal"
              value: "gpu"
              effect: "NoSchedule"
            - key: "dedicated"
              operator: "Equal"
              value: "gpu"
              effect: "NoExecute"
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          extraVolumes:
            - name: ca-certs
              configMap:
                name: ca-pemstore
                defaultMode: 0444
          extraVolumeMounts:
            - name: ca-certs
              mountPath: /etc/ssl/certs/ca.crt
              subPath: ca.crt
          env:
            - name: SSL_CERT_FILE
              value: /etc/ssl/certs/ca.crt
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/ssl/certs/ca.crt

        # --- Mount Pod Resources (For LLM workloads) ---
        mountPod:
          resources:
            requests:
              cpu: 2000m
              memory: 2Gi
            limits:
              cpu: 8000m
              memory: 8Gi
          extraVolumes:
            - name: ca-certs
              configMap:
                name: ca-pemstore
                defaultMode: 0444
          extraVolumeMounts:
            - name: ca-certs
              mountPath: /etc/ssl/certs/ca.crt
              subPath: ca.crt
          env:
            - name: SSL_CERT_FILE
              value: /etc/ssl/certs/ca.crt
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/ssl/certs/ca.crt
        
        # --- Sidecar Images (Latest stable versions) ---
        sidecars:
          csiProvisionerImage:
            repository: registry.k8s.io/sig-storage/csi-provisioner
            tag: v3.6.0
          csiResizerImage:
            repository: registry.k8s.io/sig-storage/csi-resizer
            tag: v1.9.0
          livenessProbeImage:
            repository: registry.k8s.io/sig-storage/livenessprobe
            tag: v2.11.0
          nodeDriverRegistrarImage:
            repository: registry.k8s.io/sig-storage/csi-node-driver-registrar
            tag: v2.9.0
        
        # --- Validating Webhook ---
        validatingWebhook:
          enabled: true
        
        # --- Service Accounts ---
        serviceAccount:
          controller:
            create: true
            name: juicefs-csi-controller-sa
          node:
            create: true
            name: juicefs-csi-node-sa
        
        # --- StorageClass Configuration (SeaweedFS S3) ---
        storageClasses:
          - name: juicefs-sc
            enabled: true
            reclaimPolicy: Delete
            parameters:
              name: seaweedfs-volume
              csi.storage.k8s.io/node-publish-secret-name: juicefs-sc-secret
              csi.storage.k8s.io/node-publish-secret-namespace: kube-system
              csi.storage.k8s.io/provisioner-secret-name: juicefs-sc-secret
              csi.storage.k8s.io/provisioner-secret-namespace: kube-system
            mountOptions:
              - cache-size=102400              # 100GB (use full disk)
              - cache-dir=/mnt/juicefs-cache   # Use the dedicated disk
              - free-space-ratio=0.1           # Keep 10% free space (10GB)
              - enable-ioctl
            mountPod:
              resources:
                requests:
                  cpu: 2000m
                  memory: 2Gi
                limits:
                  cpu: 8000m
                  memory: 8Gi
  
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false   # kube-system already exists
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: juicefs-sc-secret-es
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "-2"  # Install early before storage-dependent workloads
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: juicefs-sc-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        metaurl: "redis://:{{ .redis_password | urlquery }}@redis-juicefs-master.juicefs-metadata.svc.cluster.local:6379/1"
        accesskey: "{{ .accesskey }}"
        secretkey: "{{ .secretkey }}"
        access-key: "{{ .accesskey }}"
        secret-key: "{{ .secretkey }}"
        AWS_ACCESS_KEY_ID: "{{ .accesskey }}"
        AWS_SECRET_ACCESS_KEY: "{{ .secretkey }}"
        name: "seaweedfs-volume"
        storage: "s3"
        bucket: "https://s3.seaweedfs.ncs-cloud.lan"
        configs: |
          [s3]
          verify_ssl = true
          ca-cert = /etc/ssl/certs/ca.crt
        format-options: "trash-days=1,block-size=4096"
  data:
    - secretKey: redis_password
      remoteRef:
        key: db/redis
        property: redis_db_password
    - secretKey: accesskey
      remoteRef:
        key: seaweedfs/s3/admin-role
        property: access_key
    - secretKey: secretkey
      remoteRef:
        key: seaweedfs/s3/admin-role
        property: secret_key
