apiVersion: v1
kind: PersistentVolume
metadata:
  name: minio-nfs-pv
  namespace: minio-storage
spec:
  capacity:
    storage: 8Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - nfsvers=4.1
    - hard
    - timeo=600
    - retrans=2
  nfs:
    server: 172.16.0.15 #Prodesk with 8TB cold storage.
    path: /mnt/pve/Cluster-Models/minio-data