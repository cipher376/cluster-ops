apiVersion: nvidia.com/v1
kind: ClusterPolicy
metadata:
  name: gpu-cluster-policy
  namespace: gpu-operator
spec:
  driver:
    enabled: false
    tolerations:
    - key: "dedicated"
      operator: "Equal"
      value: "gpu"
      effect: "NoSchedule"
    - key: "dedicated"
      operator: "Equal"
      value: "gpu"
      effect: "NoExecute"
  
  toolkit:
    enabled: false
    tolerations:
    - key: "dedicated"
      operator: "Equal"
      value: "gpu"
      effect: "NoSchedule"
    - key: "dedicated"
      operator: "Equal"
      value: "gpu"
      effect: "NoExecute"
  
  devicePlugin:
    enabled: true
    config:
      name: time-slicing-config
      create: true
      default: "any"
      data:
        any: |
          version: v1
          sharing:
            timeSlicing:
              resources:
              - name: nvidia.com/gpu
                replicas: 4
    tolerations:
    - key: "dedicated"
      operator: "Equal"
      value: "gpu"
      effect: "NoSchedule"
    - key: "dedicated"
      operator: "Equal"
      value: "gpu"
      effect: "NoExecute"
  
  gfd:
    enabled: true
    tolerations:
    - key: "dedicated"
      operator: "Equal"
      value: "gpu"
      effect: "NoSchedule"
    - key: "dedicated"
      operator: "Equal"
      value: "gpu"
      effect: "NoExecute"
  
  dcgm:
    enabled: true
  
  dcgmExporter:
    enabled: true
  
  nodeStatusExporter:
    enabled: true
  
  operator:
    enabled: true
  
  daemonsets:
    tolerations:
    - key: "dedicated"
      operator: "Equal"
      value: "gpu"
      effect: "NoSchedule"
    - key: "dedicated"
      operator: "Equal"
      value: "gpu"
      effect: "NoExecute"
  
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: add-gpu-tolerations
  annotations:
    policies.kyverno.io/title: Add GPU Tolerations to DaemonSets
    policies.kyverno.io/category: GPU
spec:
  background: true
  rules:
    - name: add-tolerations-to-daemonsets
      match:
        any:
        - resources:
            kinds:
              - DaemonSet
            namespaces:
              - gpu-operator
            names:
              - "gpu-operator-node-feature-discovery-worker"
              - "nvidia-device-plugin-daemonset"
      mutate:
        patchStrategicMerge:
          spec:
            template:
              spec:
                tolerations:
                - key: "dedicated"
                  operator: "Equal"
                  value: "gpu"
                  effect: "NoSchedule"
                - key: "dedicated"
                  operator: "Equal"
                  value: "gpu"
                  effect: "NoExecute"