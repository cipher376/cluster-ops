---
# =============================================================================
# ExternalSecret — SeaweedFS S3 credentials from Vault
# Seed first:
#   kubectl exec -n vault vault-0 -- vault kv put -mount=secret \
#     seaweedfs/credentials \
#     adminUser="admin" \
#     adminPassword="YourSecurePassword123" \
#     s3AccessKey="your-access-key" \
#     s3SecretKey="your-secret-key"
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: seaweedfs-credentials
  namespace: seaweedfs
  labels:
    app: seaweedfs
    component: credentials
    managed-by: external-secrets
  annotations:
    external-secrets.io/refresh-interval: "1h"
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: seaweedfs-credentials
    creationPolicy: Owner
    deletionPolicy: Retain  # Keep secret if ExternalSecret is deleted
    template:
      engineVersion: v2
      type: Opaque
      metadata:
        labels:
          app: seaweedfs
          component: credentials
        annotations:
          created-by: external-secrets
          last-refresh: "{{ now | date \"2006-01-02T15:04:05Z\" }}"
      data:
        # Use index for keys with hyphens
        admin_user:     "{{ index . \"adminUser\" }}"
        admin_password: "{{ index . \"adminPassword\" }}"
        s3_access_key:  "{{ index . \"s3AccessKey\" }}"
        s3_secret_key:  "{{ index . \"s3SecretKey\" }}"
        # Additional convenience formats
        AWS_ACCESS_KEY_ID: "{{ index . \"s3AccessKey\" }}"
        AWS_SECRET_ACCESS_KEY: "{{ index . \"s3SecretKey\" }}"
  data:
    - secretKey: adminUser
      remoteRef:
        key: seaweedfs/credentials
        property: adminUser
    - secretKey: adminPassword
      remoteRef:
        key: seaweedfs/credentials
        property: adminPassword
    - secretKey: s3AccessKey
      remoteRef:
        key: seaweedfs/credentials
        property: s3AccessKey
    - secretKey: s3SecretKey
      remoteRef:
        key: seaweedfs/credentials
        property: s3SecretKey