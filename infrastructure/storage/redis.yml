apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-auth-es
  namespace: juicefs-metadata
  annotations:
    argocd.argoproj.io/sync-wave: "-4"  # Create before Redis application
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: redis-auth-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        redis-password: "{{ .redis_db_password }}"
  data:
    - secretKey: redis_db_password
      remoteRef:
        key: db/redis
        property: redis_db_password
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-juicefs
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"  # Install before JuiceFS
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: redis
    targetRevision: 25.4.1
    helm:
      values: |
        # --- Image Configuration ---
        image:
          registry: docker.io
          repository: soldevelo/redis
          tag: 8.6-debian-12
        
        # --- Helper Images ---
        volumePermissions:
          image:
            registry: bitnami.azurecr.io
            repository: bitnami/os-shell
            tag: 12-debian-12-r15
        
        sysctl:
          image:
            registry: bitnami.azurecr.io
            repository: bitnami/os-shell
            tag: 12-debian-12-r15
        
        # --- Global Settings ---
        global:
          storageClass: "local-path"
        
        # --- Architecture ---
        architecture: standalone
        
        # --- Master Configuration ---
        master:
          count: 1
          persistence:
            enabled: true
            size: 10Gi
            accessModes:
              - ReadWriteOnce
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          tolerations: []
          # Use existing secret instead of plaintext password
          configuration: |-
            maxmemory 1gb
            maxmemory-policy allkeys-lru
            save ""
            appendonly no
            appendfsync no
        
        # --- Redis Authentication (Reference existing secret) ---
        auth:
          enabled: true
          existingSecret: "redis-auth-secret"
          existingSecretPasswordKey: "redis-password"
        
        # --- Service Configuration ---
        service:
          type: ClusterIP
          ports:
            redis: 6379
        
        # --- Metrics ---
        metrics:
          enabled: true
          serviceMonitor:
            enabled: true
            namespace: juicefs-metadata
            interval: 30s
        
        # --- Update Strategy ---
        updateStrategy:
          type: RollingUpdate
  
  destination:
    server: https://kubernetes.default.svc
    namespace: juicefs-metadata
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m