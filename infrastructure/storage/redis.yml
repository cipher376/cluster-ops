
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-juicefs
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"  # Install before JuiceFS
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: redis
    targetRevision: 25.4.1   # Latest stable version
    helm:
      values: |
        # --- Global Settings ---
        global:
          storageClass: "local-path"  # Adjust to your K3s storage class
        
        # --- Architecture ---
        architecture: standalone  # Use 'replication' for HA
        
        # --- Master Configuration ---
        master:
          count: 1
          persistence:
            enabled: true
            size: 10Gi
            accessModes:
              - ReadWriteOnce
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi

          nodeSelector:
            node-role.kubernetes.io/control-plane: "true"
          tolerations:
            - key: "node-role.kubernetes.io/control-plane"
              operator: "Exists"
              effect: "NoSchedule"
            - key: "node-role.kubernetes.io/control-plane"
              operator: "Exists"
              effect: "NoExecute"
        
        # --- Redis Configuration ---
        auth:
          enabled: true
          existingSecret: "redis-auth-secret"
          existingSecretPasswordKey: "redis-password"
        
        # --- Performance Tuning for JuiceFS ---
        master:
          configuration: |-
            maxmemory 1gb
            maxmemory-policy allkeys-lru
            appendonly no
            appendfsync no
        
        # --- Service Configuration ---
        service:
          type: ClusterIP
          ports:
            redis: 6379
        
        # --- Metrics (optional, for monitoring) ---
        metrics:
          enabled: false  # Enable if you have Prometheus
          serviceMonitor:
            enabled: false
        
        # --- Update Strategy ---
        updateStrategy:
          type: RollingUpdate
  
  destination:
    server: https://kubernetes.default.svc
    namespace: juicefs-metadata  # Dedicated namespace for JuiceFS metadata services
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-auth-es
  namespace: juicefs-metadata
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: redis-auth-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        redis-password: "{{ .redis_db_password }}"
  data:
    - secretKey: redis_db_password
      remoteRef:
        key: db/redis
        property: redis_db_password