---
# =============================================================================
# ExternalSecret — SeaweedFS S3 credentials from Vault
# Seed first:
#   kubectl exec -n vault vault-0 -- vault kv put -mount=secret \
#     seaweedfs/credentials \
#     adminUser="admin" \
#     adminPassword="YourSecurePassword123" \
#     s3AccessKey="your-access-key" \
#     s3SecretKey="your-secret-key"
# =============================================================================
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: seaweedfs-credentials
  namespace: seaweedfs
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend  # Ensure this matches your ClusterSecretStore name
    kind: ClusterSecretStore
  target:
    name: seaweedfs-credentials # This is the name used in your Helm chart
    template:
      type: Opaque
      data:
        # This creates the exact file key SeaweedFS is looking for
        seaweedfs_s3_config: |
          {
            "identities": [
              {
                "name": "admin",
                "credentials": [
                  {
                    "accessKey": "{{ .access_key }}",
                    "secretKey": "{{ .secret_key }}"
                  }
                ],
                "actions": [
                  "Admin",
                  "Read",
                  "Write",
                  "List",
                  "Tagging"
                ]
              }
            ]
          }
  data:
    - secretKey: access_key
      remoteRef:
        key: seaweedfs/credentials  # Path in your Vault
        property: s3AccessKey
    - secretKey: secret_key
      remoteRef:
        key: seaweedfs/credentials  # Path in your Vault
        property: s3SecretKey
    - secretKey: ui_pass
      remoteRef:
        key: seaweedfs/credentials # New path in Vault for UI pass
        property: adminPassword  
    - secretKey: endpoint_url
      remoteRef:
        key: seaweedfs/credentials # New path in Vault for UI pass
        property: s3endpoint 