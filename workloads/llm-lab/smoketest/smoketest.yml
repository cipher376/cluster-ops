
---
apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainJob
metadata:
  name: slm-production-juicefs
  namespace: llm-lab
spec:
  runtimeRef:
    apiGroup: trainer.kubeflow.org
    kind: ClusterTrainingRuntime
    name: torch-distributed

  trainer:
    image: gitlab-registry.ncs-cloud.lan/ml/smoke-test:latest
    command: 
      - /bin/bash
      - -c
      - |
        pip install rich --quiet
        export HF_HOME=/.cache/huggingface
        export TRANSFORMERS_CACHE=/.cache/huggingface/hub
        mkdir -p /.cache/huggingface/hub
        chmod -R 777 /.cache
        exec python /workspace/train.py --model_dir=/models --dataset_dir=/datasets --output_dir=/checkpoints
    args:
      - --model_dir=/models
      - --dataset_dir=/datasets
      - --output_dir=/checkpoints
    numNodes: 1
    resourcesPerNode:
      limits:
        nvidia.com/gpu: "1"
        cpu: "4"
        memory: "16Gi"
      requests:
        nvidia.com/gpu: "1"
        cpu: "2"
        memory: "8Gi"

  runtimePatches:
    - manager: "kubeflow.org/user"   
      trainingRuntimeSpec:
        template:
          spec:
            replicatedJobs:
              - name: node
                template:
                  spec:
                    template:
                      spec:
                        imagePullSecrets:
                          - name: gitlab-secrets
                        securityContext:
                          runAsNonRoot: true
                          runAsUser: 1000
                          seccompProfile:
                            type: RuntimeDefault
                        volumes:
                          - name: juicefs-models
                            persistentVolumeClaim:
                              claimName: kubeflow-models
                          - name: juicefs-datasets
                            persistentVolumeClaim:
                              claimName: kubeflow-datasets
                          - name: juicefs-checkpoints
                            persistentVolumeClaim:
                              claimName: kubeflow-checkpoints
                          - name: ephemeral-cache
                            emptyDir:
                              medium: Memory
                        containers:
                          - name: node
                            securityContext:
                              allowPrivilegeEscalation: false
                              capabilities:
                                drop: ["ALL"]
                              runAsNonRoot: true
                              runAsUser: 1000
                            volumeMounts:
                              - mountPath: /models
                                name: juicefs-models
                                readOnly: true
                              - mountPath: /datasets
                                name: juicefs-datasets
                              - mountPath: /checkpoints
                                name: juicefs-checkpoints
                              - mountPath: /root/.cache
                                name: ephemeral-cache