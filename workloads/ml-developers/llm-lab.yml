
#=================================================================================
#   Remeber to configure storage for this profile. (storage/s3-storage.yml)
#=================================================================================
apiVersion: kubeflow.org/v1
kind: Profile
metadata:
  name: llm-lab       # 1. Choose their namespace name
spec:
  owner:
    kind: User
    name: "ntiamoah376@yahoo.com" # 2. Enter their Keycloak email
---
apiVersion: kubeflow.org/v1alpha1
kind: PodDefault
metadata:
  name: gpu-tolerations
  namespace: llm-lab
spec:
  selector:
    matchLabels:
      gpu-tolerations: "true"
      inject-shared-resource: "enabled"
  tolerations:
    - key: "dedicated"
      operator: "Equal"
      value: "gpu"
      effect: "NoExecute"
    - key: "dedicated"
      operator: "Equal"
      value: "gpu"
      effect: "NoSchedule"
  # Environment variables
  env:
    - name: JUICEFS_DATA_DIR
      value: /data
    - name: JUICEFS_MODELS_DIR
      value: /models
    - name: JUICEFS_CHECKPOINTS_DIR
      value: /checkpoints
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: juicefs-sc-secret
          key: AWS_ACCESS_KEY_ID
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: juicefs-sc-secret
          key: AWS_SECRET_ACCESS_KEY
    - name: AWS_REGION
      value: "us-east-1"
    # SSL certificate for S3
    - name: SSL_CERT_FILE
      value: /etc/ssl/certs/ca.crt
    - name: NODE_EXTRA_CA_CERTS
      value: /etc/ssl/certs/ca.crt
  volumeMounts:
    - name: juicefs-data
      mountPath: /data
    - name: juicefs-models
      mountPath: /models
    - name: juicefs-checkpoints
      mountPath: /checkpoints
    - name: ca-certs
      mountPath: /etc/ssl/certs/ca.crt
      subPath: ca.crt
  volumes:
    - name: juicefs-data
      persistentVolumeClaim:
        claimName: kubeflow-shared-data
    - name: juicefs-models
      persistentVolumeClaim:
        claimName: kubeflow-models
    - name: juicefs-checkpoints
      persistentVolumeClaim:
        claimName: kubeflow-checkpoints
    - name: ca-certs
      configMap:
        name: ca-pemstore
        defaultMode: 0444
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: llm-lab-compute-quota
  namespace: llm-lab # Target your user workspace namespace
spec:
  hard:
    # CPU and Memory ceilings across all pods in this namespace combined
    requests.cpu: "48"
    requests.memory: 64Gi
    limits.cpu: "48"
    limits.memory: 64Gi

    requests.nvidia.com/gpu: "2"
    
    # Restrict total object counts to prevent cluster clutter
    pods: "10"
    count/statefulsets: "2" # Limits the number of concurrent Notebook servers
    persistentvolumeclaims: "10" # Limits total volume claims


---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-user-limits
spec:
  limits:
  - default: # Default limits if not specified
      cpu: "10"
      memory: 24Gi
    defaultRequest: # Default requests if not specified
      cpu: "10"
      memory: 24Gi
    type: Container
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kubeflow-models
  namespace: llm-lab
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  storageClassName: juicefs-sc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kubeflow-checkpoints
  namespace: llm-lab
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 200Gi
  storageClassName: juicefs-sc