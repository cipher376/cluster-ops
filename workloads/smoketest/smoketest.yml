apiVersion: "kubeflow.org/v1"
kind: "PyTorchJob"
metadata:
  name: "slm-production-juicefs"
  namespace: kubeflow
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  pytorchReplicaSpecs:
    Worker:
      replicas: 1
      template:
        spec:
          # FIX: Placed inside template.spec alongside container definitions
          restartPolicy: OnFailure
          containers:
            - name: pytorch
              image: "gitlab-registry.ncs-cloud.lan/ml/smoke-test:latest"
              resources:
                limits:
                  nvidia.com/gpu: "1"
                  memory: "16Gi"
                  cpu: "4"
              volumeMounts:
                - name: juicefs-models
                  mountPath: /models
                  readOnly: true
                - name: juicefs-datasets
                  mountPath: /datasets
                - name: juicefs-checkpoints
                  mountPath: /checkpoints
                - name: ephemeral-cache
                  mountPath: /root/.cache
          volumes:
            - name: juicefs-models
              persistentVolumeClaim:
                claimName: kubeflow-models
            - name: juicefs-datasets
              persistentVolumeClaim:
                claimName: kubeflow-datasets
            - name: juicefs-checkpoints
              persistentVolumeClaim:
                claimName: kubeflow-checkpoints
            - name: ephemeral-cache
              emptyDir:
                medium: Memory