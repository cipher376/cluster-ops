apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainJob
metadata:
  name: slm-production-juicefs
  namespace: kubeflow
spec:
  runtimeRef:
    name: torch-distributed
    apiGroup: trainer.kubeflow.org
    kind: ClusterTrainingRuntime
  
  trainer:
    numNodes: 1
  
  runtimePatches:
    - manager: kubeflow-user
      trainingRuntimeSpec:
        template:
          spec:
            replicatedJobs:
              - name: node
                template:
                  spec:
                    template:
                      spec:
                        # Container configuration
                        containers:
                          - name: node
                            image: gitlab-registry.ncs-cloud.lan/ml/smoke-test:latest
                            resources:
                              limits:
                                nvidia.com/gpu: "1"
                                cpu: "4"
                                memory: "16Gi"
                              requests:
                                nvidia.com/gpu: "1"
                                cpu: "2"
                                memory: "8Gi"
                            securityContext:
                              allowPrivilegeEscalation: false
                              capabilities:
                                drop:
                                  - ALL
                              runAsNonRoot: true
                              runAsUser: 1000
                            volumeMounts:
                              - mountPath: /models
                                name: juicefs-models
                                readOnly: true
                              - mountPath: /datasets
                                name: juicefs-datasets
                              - mountPath: /checkpoints
                                name: juicefs-checkpoints
                              - mountPath: /root/.cache
                                name: ephemeral-cache
                        # Pod security context
                        securityContext:
                          runAsNonRoot: true
                          runAsUser: 1000
                          seccompProfile:
                            type: RuntimeDefault
                        # Volumes
                        volumes:
                          - name: juicefs-models
                            persistentVolumeClaim:
                              claimName: kubeflow-models
                          - name: juicefs-datasets
                            persistentVolumeClaim:
                              claimName: kubeflow-datasets
                          - name: juicefs-checkpoints
                            persistentVolumeClaim:
                              claimName: kubeflow-checkpoints
                          - name: ephemeral-cache
                            emptyDir:
                              medium: Memory