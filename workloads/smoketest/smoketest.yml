apiVersion: "kubeflow.org/v1"
kind: "PyTorchJob"
metadata:
  name: "slm-production-juicefs"
  namespace: kubeflow
  annotations:
    # Forces ArgoCD to successfully sync even if the CRD was just installed a second prior
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  pytorchReplicaSpecs:
    Master:
      replicas: 1
      restartPolicy: OnFailure
      template:
        spec:
          containers:
            - name: pytorch
              # UPDATED: Routing cleanly via your secure private cloud registry
              image: "gitlab-registry.ncs-cloud.lan/ml/smoke-test:latest"
              resources:
                limits:
                  nvidia.com/gpu: "1"
                  memory: "16Gi"
                  cpu: "4"
              volumeMounts:
                - name: juicefs-models
                  mountPath: /models
                  readOnly: true # Industry Standard: Protect foundation weights
                - name: juicefs-datasets
                  mountPath: /datasets # New isolated dataset directory
                - name: juicefs-checkpoints
                  mountPath: /checkpoints
                - name: ephemeral-cache
                  mountPath: /root/.cache # Hugging Face/PyTorch internal staging buffer
          volumes:
            - name: juicefs-models
              persistentVolumeClaim:
                claimName: kubeflow-models
            - name: juicefs-datasets
              persistentVolumeClaim:
                claimName: kubeflow-datasets
            - name: juicefs-checkpoints
              persistentVolumeClaim:
                claimName: kubeflow-checkpoints
            # High-performance local node NVMe storage scratchpad
            - name: ephemeral-cache
              emptyDir:
                medium: Memory # Or {} to use the host node's fast local SSD disk