apiVersion: trainer.kubeflow.org/v1
kind: TrainJob
metadata:
  name: slm-production-juicefs
  namespace: kubeflow
spec:
  # Reference an existing ClusterTrainingRuntime
  runtimeRef:
    kind: ClusterTrainingRuntime
    name: torch-distributed  # Check available runtimes first
  
  # Define the training workload
  trainer:
    # Number of replicas (workers)
    numProcPerNode: 1
    numNodes: 1
    
    # Pod template for the training container
    template:
      spec:
        containers:
        - name: trainer
          image: gitlab-registry.ncs-cloud.lan/ml/smoke-test:latest
          resources:
            limits:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "1"
          volumeMounts:
          - name: juicefs-models
            mountPath: /models
            readOnly: true
          - name: juicefs-datasets
            mountPath: /datasets
          - name: juicefs-checkpoints
            mountPath: /checkpoints
          - name: ephemeral-cache
            mountPath: /root/.cache
        volumes:
        - name: juicefs-models
          persistentVolumeClaim:
            claimName: kubeflow-models
        - name: juicefs-datasets
          persistentVolumeClaim:
            claimName: kubeflow-datasets
        - name: juicefs-checkpoints
          persistentVolumeClaim:
            claimName: kubeflow-checkpoints
        - name: ephemeral-cache
          emptyDir:
            medium: Memory
        restartPolicy: Never
EOF