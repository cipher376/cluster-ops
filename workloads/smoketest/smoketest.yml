apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainJob
metadata:
  name: slm-production-juicefs
  namespace: kubeflow
spec:
  runtimeRef:
    name: torch-distributed
  trainer:
    numNodes: 1
  replicatedJobs:
    - groupName: default
      template:
        spec:
          # --- POD LEVEL SECURITY ---
          template:
            spec:
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000 # Standard non-root user ID for PyTorch images
                seccompProfile:
                  type: RuntimeDefault
              containers:
                - name: node
                  image: gitlab-registry.ncs-cloud.lan/ml/smoke-test:latest
                  args:
                    - --model_dir=/models
                    - --dataset_dir=/datasets
                    - --output_dir=/checkpoints
                  # --- CONTAINER LEVEL SECURITY ---
                  securityContext:
                    allowPrivilegeEscalation: false
                    capabilities:
                      drop:
                        - ALL
                  resources:
                    limits:
                      cpu: "4"
                      memory: 16Gi
                      nvidia.com/gpu: "1"
                  volumeMounts:
                    - mountPath: /models
                      name: juicefs-models
                      readOnly: true
                    - mountPath: /datasets
                      name: juicefs-datasets
                    - mountPath: /checkpoints
                      name: juicefs-checkpoints
                    - mountPath: /root/.cache
                      name: ephemeral-cache
              volumes:
                - name: juicefs-models
                  persistentVolumeClaim:
                    claimName: kubeflow-models
                - name: juicefs-datasets
                  persistentVolumeClaim:
                    claimName: kubeflow-datasets
                - name: juicefs-checkpoints
                  persistentVolumeClaim:
                    claimName: kubeflow-checkpoints
                - name: ephemeral-cache
                  emptyDir:
                    medium: Memory